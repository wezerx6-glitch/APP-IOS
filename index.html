<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>APP-IOS</title>
  <style>
    /* ── TOKENS  ── */
    :root {
      --bg:         #F0F7FF;
      --bg2:        #FFFFFF;
      --bg3:        #E2EFFC;
      --accent:     #4A9EE8;
      --accent2:    #2176C7;
      --text:       #0D1B2A;
      --text2:      #4A6078;
      --pill-bg:    #FFFFFF;
      --pill-act:   #4A9EE8;
      --pill-text:  #2176C7;
      --pill-atxt:  #FFFFFF;
      --card-bg:    #FFFFFF;
      --card-sh:    0 2px 16px rgba(74,158,232,.13);
      --search-bg:  #FFFFFF;
      --toggle-off: #C8DCF0;
      --toggle-on:  #4A9EE8;
      --radius:     18px;
      --rad-sm:     12px;
      --logo-color: #2176C7;
      --star-op:    0;
    }
    [data-theme="dark"] {
      --bg:         #080810;
      --bg2:        #100D1A;
      --bg3:        #1A1428;
      --accent:     #A855F7;
      --accent2:    #7B2FBE;
      --text:       #EDE8F7;
      --text2:      #9B8DC0;
      --pill-bg:    #1A1428;
      --pill-act:   #7B2FBE;
      --pill-text:  #C084FC;
      --pill-atxt:  #FFFFFF;
      --card-bg:    #130F22;
      --card-sh:    0 2px 20px rgba(168,85,247,.18);
      --search-bg:  #1A1428;
      --toggle-off: #2D2050;
      --toggle-on:  #7B2FBE;
      --logo-color: #A855F7;
      --star-op:    1;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      transition: background .4s, color .4s;
      overflow-x: hidden;
    }

    /* ── STARS (dark mode bg) ── */
    #stars-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: var(--star-op);
      transition: opacity .6s;
    }

    /* ── LIGHT BG GRADIENT ── */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 20% 0%, #C5E0F8 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 100%, #D4EAFB 0%, transparent 55%);
      opacity: 1;
      transition: opacity .5s;
    }
    [data-theme="dark"] .bg-gradient { opacity: 0; }

    /* ── LAYOUT ── */
    .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px 100px; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      transition: background .4s;
      padding: 14px 16px 0;
      margin: 0 -16px;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }

    /* LOGO */
    .logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(74,158,232,.35);
      transition: box-shadow .3s, transform .2s;
      flex-shrink: 0;
    }
    [data-theme="dark"] .logo-icon { box-shadow: 0 3px 16px rgba(168,85,247,.4); }
    .logo-icon:hover { transform: scale(1.08); }
    .logo-icon svg { width: 20px; height: 20px; fill: #fff; }
    .logo-text {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--logo-color);
      transition: color .4s;
      font-variant-numeric: tabular-nums;
    }
    .logo-text span { opacity: .55; font-weight: 600; }

    /* TOGGLE */
    .theme-toggle {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
    }
    .toggle-label { font-size: 13px; color: var(--text2); transition: color .4s; }
    .toggle-track {
      width: 50px; height: 28px;
      background: var(--toggle-off);
      border-radius: 14px;
      position: relative;
      transition: background .4s;
      flex-shrink: 0;
    }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,.2);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), background .4s;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    [data-theme="dark"] .toggle-track { background: var(--toggle-on); }
    [data-theme="dark"] .toggle-thumb { transform: translateX(22px); }

    /* SEARCH */
    .search-wrap {
      position: relative; margin-bottom: 12px;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text2); pointer-events: none; transition: color .3s;
      display: flex; align-items: center;
    }
    .search-input {
      width: 100%; height: 46px;
      background: var(--search-bg);
      border: 1.5px solid transparent;
      border-radius: 23px;
      padding: 0 16px 0 42px;
      font-size: 15px; color: var(--text);
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .4s, color .4s;
      box-shadow: var(--card-sh);
    }
    .search-input::placeholder { color: var(--text2); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,158,232,.18);
    }
    [data-theme="dark"] .search-input:focus {
      box-shadow: 0 0 0 3px rgba(168,85,247,.22);
    }
    .search-clear {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--text2); color: #fff;
      border: none; cursor: pointer; font-size: 11px;
      display: none; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
    }
    .search-clear:hover { background: var(--accent); transform: translateY(-50%) scale(1.1); }
    .search-clear.visible { display: flex; }

    /* FILTER PILLS */
    .filters-wrap {
      overflow-x: auto; padding-bottom: 10px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filters-wrap::-webkit-scrollbar { display: none; }
    .filters {
      display: flex; gap: 8px; width: max-content; padding: 2px 0;
    }
    .pill {
      height: 34px; padding: 0 16px;
      border-radius: 17px;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--bg3);
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, color .2s, border-color .2s, transform .15s, box-shadow .2s;
      display: flex; align-items: center; gap: 6px;
      box-shadow: var(--card-sh);
    }
    .pill:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(74,158,232,.2); }
    [data-theme="dark"] .pill:hover { box-shadow: 0 4px 16px rgba(168,85,247,.25); }
    .pill.active {
      background: var(--pill-act);
      color: var(--pill-atxt);
      border-color: transparent;
      box-shadow: 0 3px 14px rgba(74,158,232,.35);
    }
    [data-theme="dark"] .pill.active { box-shadow: 0 3px 14px rgba(168,85,247,.4); }
    .pill-emoji { font-size: 15px; }

    /* DIVIDER */
    .header-divider {
      height: 1px; background: var(--bg3); margin: 0 -16px;
      transition: background .4s;
    }

    /* ── MAIN ── */
    main { padding-top: 20px; }

    .section-title {
      font-size: 20px; font-weight: 700; margin-bottom: 16px;
      color: var(--text); transition: color .4s;
      display: flex; align-items: center; gap: 8px;
    }
    .count-badge {
      font-size: 12px; font-weight: 600;
      background: var(--bg3); color: var(--text2);
      padding: 2px 8px; border-radius: 10px;
      transition: background .4s, color .4s;
    }

    /* ── APP GRID ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px;
    }

    /* ── APP CARD ── */
    .app-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px 14px;
      box-shadow: var(--card-sh);
      cursor: pointer;
      transition: transform .2s, box-shadow .25s, background .4s, opacity .3s;
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeIn .35s ease both;
    }
    .app-card:hover { transform: translateY(-3px) scale(1.02); }
    .app-card:active { transform: scale(.97); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app-icon {
      width: 60px; height: 60px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .app-icon::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.25) 0%, transparent 60%);
      border-radius: inherit;
    }

    .app-info { display: flex; flex-direction: column; gap: 3px; }
    .app-name {
      font-size: 14px; font-weight: 700; color: var(--text);
      line-height: 1.2; transition: color .4s;
    }
    .app-desc {
      font-size: 11.5px; color: var(--text2); line-height: 1.4;
      transition: color .4s;
    }
    .app-cat {
      font-size: 10.5px; font-weight: 600;
      padding: 2px 7px; border-radius: 6px;
      background: var(--bg3); color: var(--text2);
      width: fit-content;
      transition: background .4s, color .4s;
    }
    .app-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 2px;
    }
    .app-price {
      font-size: 12px; font-weight: 700; color: var(--accent);
    }
    .get-btn {
      height: 28px; padding: 0 14px;
      border-radius: 14px;
      background: var(--bg3);
      color: var(--accent);
      font-size: 12px; font-weight: 700;
      border: none; cursor: pointer;
      transition: background .2s, color .2s, transform .15s;
    }
    .get-btn:hover {
      background: var(--accent); color: #fff;
      transform: scale(1.05);
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text2);
      animation: fadeIn .3s ease;
    }
    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: 14px; }

    /* ── TOAST (voor apps zonder link) ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg);
      padding: 12px 20px; border-radius: 50px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: all .3s;
      z-index: 300; white-space: nowrap; pointer-events: none;
      box-shadow: 0 6px 24px rgba(0,0,0,.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 40px 0 20px;
      font-size: 12px; color: var(--text2);
      transition: color .4s;
    }

    /* ── RESPONSIVE DESKTOP ── */
    @media (min-width: 600px) {
      .page { padding: 0 24px 100px; }
      header { padding: 18px 24px 0; margin: 0 -24px; }
      .app-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; }
      .logo-text { font-size: 22px; }
    }
    @media (min-width: 900px) {
      .app-grid { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); }
    }
  </style>
</head>
<body>
  <!-- Stars canvas (dark mode) -->
  <canvas id="stars-canvas"></canvas>

  <!-- Light bg blobs -->
  <div class="bg-gradient"></div>

  <div class="page">
    <!-- HEADER -->
    <header>
      <div class="header-top">
        <!-- Logo -->
        <a class="logo" href="#">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
          </div>
          <span class="logo-text">APP<span>-IOS</span></span>
        </a>

        <!-- Theme toggle -->
        <div class="theme-toggle" onclick="toggleTheme()" role="button" aria-label="Thema wisselen">
          <span class="toggle-label" id="toggle-label">☀️</span>
          <div class="toggle-track">
            <div class="toggle-thumb" id="toggle-thumb">🌙</div>
          </div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </span>
        <input
          type="search"
          class="search-input"
          id="search-input"
          placeholder="Zoek apps…"
          autocomplete="off"
          oninput="handleSearch(this.value)"
        />
        <button class="search-clear" id="search-clear" onclick="clearSearch()" aria-label="Wis zoekopdracht">✕</button>
      </div>

      <!-- Filter pills -->
      <div class="filters-wrap">
        <div class="filters" id="filters">
          <button class="pill active" data-cat="all" onclick="setFilter('all', this)">
            <span class="pill-emoji">🔮</span> Alle
          </button>
          <button class="pill" data-cat="Games" onclick="setFilter('Games', this)">
            <span class="pill-emoji">🎮</span> Games
          </button>
          <button class="pill" data-cat="AI" onclick="setFilter('AI', this)">
            <span class="pill-emoji">🤖</span> AI
          </button>
          <button class="pill" data-cat="Notes" onclick="setFilter('Notes', this)">
            <span class="pill-emoji">📝</span> Notes
          </button>
          <button class="pill" data-cat="Phone" onclick="setFilter('Phone', this)">
            <span class="pill-emoji">📱</span> Phone
          </button>
          <button class="pill" data-cat="School" onclick="setFilter('School', this)">
            <span class="pill-emoji">🎓</span> School
          </button>
          <button class="pill" data-cat="Money" onclick="setFilter('Money', this)">
            <span class="pill-emoji">💰</span> Money
          </button>
        </div>
      </div>
      <div class="header-divider"></div>
    </header>

    <!-- MAIN -->
    <main>
      <div class="section-title">
        <span id="section-label">Alle apps</span>
        <span class="count-badge" id="count-badge">0</span>
      </div>
      <div class="app-grid" id="app-grid"></div>
      <div class="empty" id="empty-state" style="display:none">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Geen apps gevonden</div>
        <div class="empty-sub">Probeer een andere zoekterm of filter</div>
      </div>
    </main>

    <footer>
      APP-IOS &nbsp;·&nbsp; Alle rechten voorbehouden &nbsp;·&nbsp; 2025
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* ─── DATA ───
       Apps met een "url" zijn ECHTE, werkende apps: klik op de kaart of
       op de knop en de app opent gewoon (in een nieuw tabblad).
       Apps zonder "url" zijn nog placeholders. */
    const APPS = [
      {
        id: 1, name: "Clash of Clans", cat: "Games",
        icon: "⚔️", color: "#FF6B35",
        desc: "Bouw je dorp, train troepen en vecht!",
        price: "Gratis"
      },
      {
        id: 2, name: "ChatGPT", cat: "AI",
        icon: "🤖", color: "#10A37F",
        desc: "AI-assistent voor al je vragen.",
        price: "Gratis"
      },
      {
        id: 3, name: "Notion", cat: "Notes",
        icon: "📓", color: "#000000",
        desc: "Notities, databases en projecten.",
        price: "Gratis"
      },
      {
        id: 4, name: "WhatsApp", cat: "Phone",
        icon: "💬", color: "#25D366",
        desc: "Berichten, bellen en video.",
        price: "Gratis"
      },
      {
        id: 5, name: "Duolingo", cat: "School",
        icon: "🦉", color: "#58CC02",
        desc: "Leer talen op een leuke manier.",
        price: "Gratis"
      },
      {
        id: 6, name: "Splitwise", cat: "Money",
        icon: "💳", color: "#5BC5A7",
        desc: "Verdeel kosten met vrienden.",
        price: "Gratis"
      },
      {
        id: 7, name: "Minecraft", cat: "Games",
        icon: "⛏️", color: "#4CAF50",
        desc: "Bouw en overleef in een blokjeswereld.",
        price: "€6,99"
      },
      {
        id: 8, name: "Perplexity", cat: "AI",
        icon: "🔮", color: "#7C3AED",
        desc: "Zoeken met AI-antwoorden.",
        price: "Gratis"
      },
      {
        id: 9, name: "Apple Notes", cat: "Notes",
        icon: "📋", color: "#FFD60A",
        desc: "Simpele snelle notities van Apple.",
        price: "Gratis"
      },
      {
        id: 10, name: "Facetime", cat: "Phone",
        icon: "📹", color: "#34C759",
        desc: "Videobellen met andere Apple gebruikers.",
        price: "Gratis"
      },
      {
        id: 11, name: "Khan Academy", cat: "School",
        icon: "🎓", color: "#14BF96",
        desc: "Gratis lessen voor alle vakken.",
        price: "Gratis"
      },
      {
        id: 12, name: "Revolut", cat: "Money",
        icon: "💜", color: "#0075EB",
        desc: "Slim bankieren en uitgaven bijhouden.",
        price: "Gratis"
      },
      {
        id: 13, name: "Werkuren Tracker", cat: "Money",
        icon: "⏱️", color: "#4A7CF7",
        desc: "Houd je werkuren en verdiensten bij per map.",
        price: "Gratis",
        url: "werkuren.html"
      },
      {
        id: 14, name: "Spaarpot", cat: "Money",
        icon: "💵", color: "#34C759",
        desc: "Spaar voor je doelen met vullende balken.",
        price: "Gratis",
        url: "spaarpot.html"
      },
      {
        id: 15, name: "Dagboek", cat: "Notes",
        icon: "📔", color: "#A84A54",
        desc: "Schrijf in eigen boeken en markeer in kleur.",
        price: "Gratis",
        url: "dagboek.html"
      },
    ];

    /* ─── STATE ─── */
    let currentFilter = "all";
    let currentSearch = "";

    /* ─── THEME ─── */
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute("data-theme") === "dark";
      html.setAttribute("data-theme", isDark ? "light" : "dark");
      document.getElementById("toggle-label").textContent = isDark ? "☀️" : "🌙";
      document.getElementById("toggle-thumb").textContent = isDark ? "🌙" : "☀️";
      if (!isDark) initStars(); else stopStars();
    }

    /* ─── STARS ─── */
    let starsAnimId = null;
    function initStars() {
      const canvas = document.getElementById("stars-canvas");
      const ctx = canvas.getContext("2d");
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;

      const stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.5 + .3,
        speed: Math.random() * .4 + .1,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * .02 + .005,
      }));

      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.twinkle += s.twinkleSpeed;
          const alpha = .4 + .6 * Math.abs(Math.sin(s.twinkle));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,180,255,${alpha})`;
          ctx.fill();
          s.y += s.speed * .05;
          if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
        });
        starsAnimId = requestAnimationFrame(draw);
      }
      if (starsAnimId) cancelAnimationFrame(starsAnimId);
      draw();

      window.addEventListener("resize", () => {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      });
    }
    function stopStars() {
      if (starsAnimId) { cancelAnimationFrame(starsAnimId); starsAnimId = null; }
    }

    /* ─── FILTER ─── */
    function setFilter(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      const labels = { all: "Alle apps", Games: "Games 🎮", AI: "AI 🤖", Notes: "Notes 📝", Phone: "Phone 📱", School: "School 🎓", Money: "Money 💰" };
      document.getElementById("section-label").textContent = labels[cat] || cat;
      renderApps();
    }

    /* ─── SEARCH ─── */
    function handleSearch(val) {
      currentSearch = val.toLowerCase().trim();
      document.getElementById("search-clear").classList.toggle("visible", val.length > 0);
      renderApps();
    }
    function clearSearch() {
      const inp = document.getElementById("search-input");
      inp.value = "";
      handleSearch("");
      inp.focus();
    }

    /* ─── TOAST ─── */
    function toast(msg, dur = 2200) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), dur);
    }

    /* ─── RENDER ─── */
    function renderApps() {
      const grid = document.getElementById("app-grid");
      const empty = document.getElementById("empty-state");
      const badge = document.getElementById("count-badge");

      const filtered = APPS.filter(a => {
        const catOk = currentFilter === "all" || a.cat === currentFilter;
        const searchOk = !currentSearch ||
          a.name.toLowerCase().includes(currentSearch) ||
          a.desc.toLowerCase().includes(currentSearch) ||
          a.cat.toLowerCase().includes(currentSearch);
        return catOk && searchOk;
      });

      badge.textContent = filtered.length;

      if (filtered.length === 0) {
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      grid.innerHTML = filtered.map((a, i) => `
        <div class="app-card" style="animation-delay:${i * 40}ms" onclick="openApp(${a.id})">
          <div class="app-icon" style="background:${a.color}20">${a.icon}</div>
          <div class="app-info">
            <div class="app-cat">${a.cat}</div>
            <div class="app-name">${a.name}</div>
            <div class="app-desc">${a.desc}</div>
          </div>
          <div class="app-footer">
            <span class="app-price">${a.price}</span>
            <button class="get-btn" onclick="event.stopPropagation();getApp(${a.id})">${a.url ? "OPEN" : "KRIJGEN"}</button>
          </div>
        </div>
      `).join("");
    }

    /* Klik op de kaart zelf: open de app als er een url is */
    function openApp(id) {
      const app = APPS.find(a => a.id === id);
      if (app && app.url) {
        window.open(app.url, "_blank");
      } else {
        toast("🚧 Nog niet beschikbaar");
      }
    }

    /* Klik op de knop */
    function getApp(id) {
      const app = APPS.find(a => a.id === id);
      const btn = event.target;
      if (app && app.url) {
        window.open(app.url, "_blank");
        return;
      }
      btn.textContent = "✓";
      btn.style.background = "var(--accent)";
      btn.style.color = "#fff";
      setTimeout(() => { btn.textContent = "KRIJGEN"; btn.style.background = ""; btn.style.color = ""; }, 1500);
    }

    /* ─── INIT ─── */
    renderApps();
    // Start stars if dark mode on load
    if (document.documentElement.getAttribute("data-theme") === "dark") initStars();
  </script>
</body>
</html>
